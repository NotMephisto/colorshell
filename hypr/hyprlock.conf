# Hyprlock                                                          
# Original config submitted by https://github.com/SherLock707

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/matugen/matugen-hyprland.conf

# Под матугенчик нужно настроить)

$text_color = $foreground
$entry_background_color = $background
$entry_border_color = rgba(896E6C55)
$entry_color = $primary_container
$font_family = Adwaita Sans
$font_family_clock = Adwaita Sans
$font_material_symbols = Material Symbols Rounded
$wallpaper = swww query | grep -oP 'image: \K.*'

background {
    color = $background
    # reload_cmd = cmd[update:100] echo "$(swww query | grep -oP 'image: \K.*')"
    # path = {{ SWWW_WALL }}
    path = screenshot
    blur_size = 15
    blur_passes = 4
}

label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock

    position = 0, 300
    halign = center
    valign = center
}

label { # Date
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family

    position = 0, 240
    halign = center
    valign = center
}

label { #Media
    monitor =
    font_size = 12
    font_family = $font_family
    color = $text_color
    text = cmd[update:1000] bash -c 'playerctl metadata && echo -e "󰎇  $(playerctl metadata title) - $(playerctl metadata artist)"' | tail -n 1
    shadow_passes = 1
    shadow_size = 2
    shadow_color = $background
    shadow_boost = 0.4
    halign = center
    valign = center
    position = 0, 180
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = $background
    inner_color = $entry_background_color
    font_color = $text_color
    check_color = $secondary
    fail_color = $tertiary
    capslock_color = $primary_fixed_dim
    fade_on_empty = true
    
    position = 0, 20
    halign = center
    valign = center
}

label { # User
    monitor =
    text =     $USER
    color = $text_color
    shadow_passes = 1
    shadow_boost = 0.35
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = bottom
}

label { # Layout
    monitor =
    text = cmd[update:100] echo "    $LAYOUT"
    color = $text_color
    
    font_size = 20
    font_family = $font_family
    position = 0, 100
    halign = center
    valign = bottom
}
