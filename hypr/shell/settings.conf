# User Settings
# This is where you put your own settings as this will not be touched during update
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/matugen/matugen-hyprland.conf

# blurls = waybar
# blurls = rofi
# blurls = swaync

dwindle {
  pseudotile = yes
  preserve_split = yes
  special_scale_factor = 0.8
}

master {
  new_status = master #from Hyprland >v0.41.2
  new_on_top = 1
  mfact = 0.5
}

general {
  #sensitivity = 1.00 #and again....
  border_size = 2
  #apply_sens_to_raw = 1 #broke after updates
  gaps_in = 6
  gaps_out = 8

  resize_on_border = true

  col.active_border = $on_primary
  col.inactive_border = $background

  layout = dwindle
}

group {
  col.border_active = $on_error_container

	groupbar {
		col.active = $primary
  }
}

render {
  direct_scanout = false
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
	vfr = true
  #vrr = 0
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
  focus_on_activate = false
  initial_workspace_tracking = 0
  middle_click_paste = false
}

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

#Could help when scaling and not pixelating
xwayland {
  force_zero_scaling = true
}

# cursor section for Hyprland >= v0.41.0
cursor {
  sync_gsettings_theme = true
  no_hardware_cursors = false
  enable_hyprcursor = false
  warp_on_change_workspace = true # for -git or Hyprland >v0.41.1
}
