
# color-shell specific configuration, please don't modify unless you know what you're doing!

bind = $mainMod, D, exec, $menu
bind = $mainMod, F11, fullscreen


bind = , Print, exec, sh $XDG_CONFIG_HOME/hypr/scripts/screenshot.sh
bind = $mainMod, Print, exec, sh $XDG_CONFIG_HOME/hypr/scripts/screenshot.sh full
bind = $mainMod SHIFT, S, exec, $XDG_CONFIG_HOME/hypr/scripts/Screenshots.sh --freeze
bind = $mainMod SHIFT, D, exec, flatpak run be.alexandervanhee.gradia --screenshot=INTERACTIVE
#bind = $mainMod SHIFT, D, exec, $XDG_CONFIG_HOME/hypr/scripts/Screenshots.sh --swappy

# Test-only bind, restarts colorshell
bind = $mainMod, F7, exec, ags request reload

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, $XDG_CONFIG_HOME/hypr/scripts/KillActiveProcess.sh
bind = $mainMod, E, exec, $fm
bind = $mainMod, F, fullscreen, 1
bind = CTRL Super, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit
bind = $mainMod, G, togglegroup
bind = $mainMod, N, exec, astal toggle control-center
bind = $mainMod, M, exec, astal toggle center-window
bind = $mainMod, L, exec, hyprlock
bind = $mainMod CTRL SHIFT, z, exec, astal runner '>' || sh $XDG_CONFIG_HOME/hypr/scripts/clipboard-menu.sh
bind = $mainMod, W, exec, astal runner '##'

# bind = $mainMod, $mainMod_L, exec, astal toggle apps-window
bind = $mainMod, $mainMod_l, exec, astal peek-workspace-num

# pyprland
bind = $mainMod SHIFT, Return, exec, pypr toggle term # Dropdown terminal
bind = $mainMod, Z, exec, pypr zoom # Toggle Zoom

bindel = , XF86AudioLowerVolume, exec, astal volume sink-decrease 5 || wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Decrease volume
bindel = , XF86AudioRaiseVolume, exec, astal volume sink-increase 5 || wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ # Increase volume
bindl = , XF86AudioMute, exec, astal volume sink-mute || wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Toggle Audio mute
bindl = , XF86AudioMicMute, exec, astal volume source-mute || wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Toggle Microphone mute
bind = , XF86AudioPrev, exec, playerctl previous # Previous media
bind = , XF86AudioNext, exec, playerctl next # Next media
bind = , XF86AudioPlay, exec, playerctl play-pause # Toggle Play/Pause media

bindel = $mainMod, XF86AudioRaiseVolume, exec, astal volume source-increase 5 || wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
bindel = $mainMod, XF86AudioLowerVolume, exec, astal volume source-decrease 5 || wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-

bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%- # Lower monitor brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5% # Increase monitor brightness

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# Move windows with keyboard keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d 
bind = $mainMod SHIFT, C, centerwindow


# Resize windows with arrow keys / hjkl
binde = $mainMod ALT, left, resizeactive, -60 0
binde = $mainMod ALT, down, resizeactive, 0 60
binde = $mainMod ALT, up, resizeactive, 0 -60
binde = $mainMod ALT, right, resizeactive, 60 0

binde = $mainMod ALT, H, resizeactive, -60 0
binde = $mainMod ALT, J, resizeactive, 0 60
binde = $mainMod ALT, K, resizeactive, 0 -60
binde = $mainMod ALT, L, resizeactive, 60 0


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = $mainMod CTRL, 0, movetoworkspacesilent, 1
bind = $mainMod CTRL, 1, movetoworkspacesilent, 2
bind = $mainMod CTRL, 2, movetoworkspacesilent, 3
bind = $mainMod CTRL, 3, movetoworkspacesilent, 4
bind = $mainMod CTRL, 4, movetoworkspacesilent, 5
bind = $mainMod CTRL, 5, movetoworkspacesilent, 6
bind = $mainMod CTRL, 6, movetoworkspacesilent, 7
bind = $mainMod CTRL, 7, movetoworkspacesilent, 8
bind = $mainMod CTRL, 8, movetoworkspacesilent, 9
bind = $mainMod CTRL, 9, movetoworkspacesilent, 10
bind = $mainMod CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [ or ]
bind = $mainMod CTRL, bracketright, movetoworkspacesilent, +1

bind = CTRL $mainMod, right, workspace, e+1
bind = CTRL $mainMod, left, workspace, e-1

#bind = $mainMod, S, togglespecialworkspace, special
#bind = $mainMod SHIFT, S, movetoworkspace, special:special

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
