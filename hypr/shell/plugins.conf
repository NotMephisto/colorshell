$mainMod = SUPER

binde = $mainMod, A, exec, hyprctl dispatch overview:toggle
#$mainMod, A, exec, hyprctl dispatch overview:toggle
#bind = $mainMod ALT, grave, hyprexpo:expo, toggle # can be: toggle, off/disable or on/enable


plugin {
	overview {
		panelColor = rgba($background_rgb, 0.45) # под задний фон gtk темы
		# panelBorderColor = rgba($background_rgb, 0.8) # похуй
		# workspaceActiveBackground = rgba(245, 40, 145, 0.8) # не понял что именно меняется
		# workspaceInactiveBackground = rgba(245, 40, 145, 0.8) # тоже не понятно
		dragAlpha = 1
		onBottom = 1
		# autoDrag = 1
		# exitOnClick = 0
		hideRealLayers = 0
		# hideBackgroundLayers = 1 # убирает фон
		# hideTopLayers = 1
		# hideOverlayLayers = 1
		# drawActiveWorkspace = 0
		showEmptyWorkspace = 0
		showNewWorkspace = 1
		panelHeight = 150
		# panelBorderWidth = 20
		
	}
    	hyprexpo {
        	columns = 3
        	gap_size = 5
        	bg_col = rgb(111111)
        	workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        	enable_gesture = true # laptop touchpad
        	gesture_fingers = 3  # 3 or 4
        	gesture_distance = 300 # how far is the "max"
        	gesture_positive = true # positive = swipe down. Negative = swipe up.
    }
}
